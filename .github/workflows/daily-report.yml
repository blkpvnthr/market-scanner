name: Daily Opportunity Report

# Serverless schedule: runs on GitHub's infrastructure (no laptop needed).
# GitHub cron is always UTC and does NOT observe daylight saving, so we trigger
# at the two UTC times that bracket 08:30 in the target timezone across DST and
# let an in-job guard fire exactly one of them.
#
#   12:30 UTC = 08:30 America/New_York during EDT (summer)
#   13:30 UTC = 08:30 America/New_York during EST (winter)
#
# Change REPORT_TZ (repo Variable) to your timezone; the guard adapts automatically.

on:
  schedule:
    - cron: "30 12 * * 1-5"   # Mon-Fri
    - cron: "30 13 * * 1-5"   # Mon-Fri
  workflow_dispatch:           # allow manual "Run workflow" any time

permissions:
  contents: read

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    env:
      REPORT_TZ: ${{ vars.REPORT_TZ || 'America/New_York' }}
      OE_PROVIDER: ${{ vars.OE_PROVIDER || 'yahoo' }}
      EMAIL_TOP_N: ${{ vars.EMAIL_TOP_N || '25' }}
      # Secrets (configure in repo Settings -> Secrets and variables -> Actions):
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      # Optional provider keys (engine degrades gracefully without them):
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      APCA_API_KEY: ${{ secrets.APCA_API_KEY }}
      APCA_SECRET_KEY: ${{ secrets.APCA_SECRET_KEY }}
    steps:
      - name: Decide whether this trigger is the 08:30 local one
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run -> proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          local_h=$(TZ="$REPORT_TZ" date +%H)
          local_hm=$(TZ="$REPORT_TZ" date +%H:%M)
          echo "Local time in $REPORT_TZ is $local_hm (hour=$local_h)."
          if [ "$local_h" = "08" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the 08:xx local trigger -> skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (providers extra; no streamlit)
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[providers]"

      - name: Scan and email the report (>=20 candidates, ranked by max return)
        if: steps.gate.outputs.run == 'true'
        run: python -m opportunity_engine email
